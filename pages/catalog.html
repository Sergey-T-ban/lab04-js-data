<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог курсів</title>
<link rel="stylesheet" href="../styles/style.css">
<script src="../js/main.js"></script>
</head>
<body>

<header class="header">
  <div class="container">
    <h1 class="logo">EduCourses</h1>
    <nav class="nav">
      <a href="../index.html">Головна</a>
      <a href="./catalog.html">Каталог</a>
      <a href="./favorites.html">Обране</a>
    </nav>
  </div>
</header>

<main class="container">
  <h1>Каталог курсів</h1>

<div class="controls">

<input
type="text"
id="search"
placeholder="Пошук курсів..."
>

<select id="category">
<option value="all">Усі категорії</option>
<option value="frontend">Frontend</option>
<option value="backend">Backend</option>
<option value="design">Design</option>
</select>

<select id="sort">
<option value="default">Без сортування</option>
<option value="title">За назвою</option>
<option value="rating">За рейтингом</option>
<option value="price">За ціною</option>
</select>

</div>

<div id="loading">Завантаження...</div>

<div id="error" class="hidden"></div>

<div id="empty" class="hidden">
Нічого не знайдено
</div>

<div id="catalog"></div>

<button id="loadMore" class="hidden">Показати ще</button>
</main>

<footer class="footer">
  <p>© 2026 EduCourses</p>
</footer>

<script src="../js/catalog.js"></script>

</body>
</html>
